<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Pessoas</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.13/dist/face-api.js"></script>
</head>
<body>
  <header class="topbar"><h1>Controle de Acesso Facial</h1><nav></nav></header>
  <main>
    <div class="card">
      <h2>Cadastrar pessoa</h2>
      <p class="muted">A imagem nunca é salva — apenas o descriptor (vetor de 128 números) é enviado ao servidor.</p>
      <div class="row">
        <div>
          <label for="name">Nome*</label>
          <input id="name" required />
          <label for="external_id">Matrícula / crachá (opcional)</label>
          <input id="external_id" />
          <label for="role">Perfil de acesso (opcional)</label>
          <input id="role" placeholder="ex.: funcionário, visitante" />
          <button id="captureBtn" disabled>Capturar rosto e cadastrar</button>
        </div>
        <div>
          <div class="video-wrap">
            <video id="video" autoplay muted playsinline></video>
          </div>
        </div>
      </div>
      <div id="msg"></div>
    </div>

    <div class="card">
      <h2>Pessoas cadastradas</h2>
      <table>
        <thead><tr><th>Nome</th><th>Matrícula</th><th>Perfil</th><th>Status</th><th></th></tr></thead>
        <tbody id="peopleBody"></tbody>
      </table>
    </div>
  </main>
  <script type="module" src="/js/enroll.js"></script>
</body>
</html>
