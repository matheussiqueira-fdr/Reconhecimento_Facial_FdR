<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registros de Acesso</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="topbar"><h1>Controle de Acesso Facial</h1><nav></nav></header>
  <main>
    <div class="card">
      <h2>Registros de acesso</h2>
      <label for="filter">Filtrar</label>
      <select id="filter" style="max-width:240px;">
        <option value="">Todos</option>
        <option value="granted">Liberados</option>
        <option value="denied">Negados</option>
      </select>
      <table style="margin-top:1rem;">
        <thead><tr><th>Data/hora</th><th>Pessoa</th><th>Resultado</th><th>Distância</th><th>Operador</th><th>Motivo</th></tr></thead>
        <tbody id="logsBody"></tbody>
      </table>
    </div>
  </main>
  <script type="module" src="/js/logs.js"></script>
</body>
</html>
